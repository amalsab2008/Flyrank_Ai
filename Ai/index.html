<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amal S — AI & Cybersecurity Engineering Intern</title>
  <meta name="description" content="Portfolio of Amal S. I build secure-by-design backend tools and AI-native web applications that don't break in production.">
  
  <!-- Identity Kit Fonts: Outfit (Headings) & Inter (Body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Identity Kit Design System Tokens */
    :root {
      --bg-color: #0F172A;       /* Slate 900 */
      --card-bg: #1E293B;        /* Slate 800 */
      --text-main: #F8FAFC;      /* Slate 50 */
      --text-muted: #94A3B8;     /* Slate 400 */
      --accent: #6366F1;         /* Indigo 500 */
      --accent-hover: #4F46E5;   /* Indigo 600 */
      --border-color: #334155;   /* Slate 700 */
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      border: 2px solid var(--border-color);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .claim {
      font-size: 1.125rem;
      line-height: 1.6;
      color: var(--text-main);
      margin-bottom: 2rem;
      font-weight: 400;
    }

    .cta-button {
      display: inline-block;
      background-color: var(--accent);
      color: #FFFFFF;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      padding: 0.875rem 1.75rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    .cta-button:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    footer {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <main class="container">
    <img src="portfolio_favicon_logo.png" alt="Amal S Monogram Logo" class="logo">
    
    <div>
      <span class="status-badge">
        <span class="pulse"></span>
        Empty but Live — Week 4 Milestone
      </span>
    </div>

    <h1>Amal S</h1>
    <p class="subtitle">AI & Cybersecurity Engineering Intern</p>

    <p class="claim">
      "I build secure-by-design backend tools and AI-native web applications that don't break in production."
    </p>

    <a href="mailto:amalsab2008@gmail.com" class="cta-button" id="main-cta-button">
      Schedule a 15-Minute Technical Discussion
    </a>
  </main>

  <footer>
    <p>&copy; 2026 Amal S. FlyRank AI Engineering Track.</p>
  </footer>

</body>
</html>
